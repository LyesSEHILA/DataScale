name: CI Pipeline (Build, Test, Analyze)

on:
  push:
    branches:
      - develop
      - main
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build-and-analyze:
    name: Build, Test and Analyze
    runs-on: ubuntu-latest

    steps:
      # 1. Récupérer le code (fetch-depth: 0 est requis pour SonarCloud !)
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      # 2. Installer Java (JDK 21)
      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'

      # 3. Donner la permission d'exécution au wrapper Gradle
      - name: Grant execute permission for gradlew
        run: chmod +x backend/gradlew

      # 4. Lancer le build AVEC les secrets injectés
      - name: Build, Test and Generate Coverage Report
        working-directory: ./backend
        env:
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          RABBITMQ_PASS: ${{ secrets.RABBITMQ_PASS }}
          HF_API_KEY: ${{ secrets.HF_API_KEY }}
        run: ./gradlew build jacocoTestReport

      # 5. Lancer l'analyse SonarCloud
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          projectBaseDir: backend
          args: >
              -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }}
              -Dsonar.projectKey=LyesSEHILA_DataScale
              -Dsonar.java.binaries=build/classes/java/main
              -Dsonar.coverage.jacoco.xmlReportPaths=build/reports/jacoco/test/jacocoTestReport.xml
              -Dsonar.coverage.exclusions=src/main/java/com/cyberscale/backend/models/**,src/main/java/com/cyberscale/backend/dto/**,src/test/java/**
              -Dsonar.cpd.exclusions=src/main/resources/data.sql
              -Dsonar.cpd.exclusions=**/*Test.java,**/test/**,**/data.sql
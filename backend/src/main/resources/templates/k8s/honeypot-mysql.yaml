apiVersion: v1
kind: Pod
metadata:
  name: ${POD_NAME}
  labels:
    app: honeypot-mysql
spec:
  runtimeClassName: kata
  automountServiceAccountToken: false
  
  volumes:
  - name: shared-logs
    emptyDir: {}

  containers:
  - name: mysql
    image: mysql:5.7
    env:
    - name: MYSQL_ROOT_PASSWORD
      value: "${RANDOM_PASS}"
    volumeMounts:
    - name: shared-logs
      mountPath: /var/log/mysql
    args: ["--log-error=/var/log/mysql/error.log"]
    resources:
      limits:
        memory: "512Mi"
        cpu: "500m"

  - name: log-spy
    image: curlimages/curl:latest
    volumeMounts:
    - name: shared-logs
      mountPath: /var/log/mysql
    command: ["/bin/sh", "-c"]
    args:
      - >-
        touch /var/log/mysql/error.log &&
        tail -F /var/log/mysql/error.log | while read line; do
          curl -s -X POST -H "Content-Type: application/json" \
          -d "{\"source\":\"${POD_NAME}\", \"message\":\"$line\"}" \
          http://host.docker.internal:8080/api/intelligence/log;
        done